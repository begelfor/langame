# Hybrid local dev: only stateful infra runs in Docker.
# Django (runserver), Celery worker, and Celery beat run on the host via uv.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: langame
      POSTGRES_PASSWORD: langame
      POSTGRES_DB: langame
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langame"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
